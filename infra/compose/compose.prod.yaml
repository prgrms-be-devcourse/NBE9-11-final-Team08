# 운영(prod) override — base(compose.yaml) 위에 얹어 사용.
#   docker compose -f compose.yaml -f compose.prod.yaml up -d
#   아니면, make prod
# nginx / certbot(TLS) 은 운영 전용 관심사라 base 가 아닌 여기서 정의한다.
# (dev 는 base + compose.dev.yaml 만 쓰므로 nginx/certbot 이 딸려오지 않는다.)
services:
  backend:
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    image: ${BACKEND_IMAGE}:${IMAGE_TAG:-latest}
    pull_policy: always

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/templates/prod.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot_www:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - public

  certbot:
    image: certbot/certbot:v3.3.0
    profiles: ["certbot"]
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

volumes:
  certbot_www:
  letsencrypt:

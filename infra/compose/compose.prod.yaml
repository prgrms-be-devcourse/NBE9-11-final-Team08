# 운영(prod) override — app 서버에서 base(compose.yaml) 위에 얹어 사용.
#   docker compose -f compose.yaml -f compose.prod.yaml up -d
#   아니면, make prod
# nginx / certbot(TLS)은 edge 서버의 compose.edge.yaml에서 따로 실행한다.
services:
  backend:
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    image: ${BACKEND_IMAGE}:${IMAGE_TAG:-latest}
    pull_policy: always

name: nbe9-11-final-team08

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - internal

  backend:
    build:
      context: ../../backend
    image: ${BACKEND_IMAGE:-team08-backend}:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      # 활성 env-file을 따라간다: dev/perf 는 .env.dev(BACKEND_ENV_FILE=.env.dev),
      # prod 는 미정의라 기본 .env. (--env-file 은 보간에만 쓰여 컨테이너 env_file 을 바꾸지 않으므로
      #  이 변수가 없으면 백엔드만 .env 를 읽어 db(.env.dev)와 자격증명이 어긋난다)
      - ${BACKEND_ENV_FILE:-.env}
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: Asia/Seoul
    ports:
      - "${BACKEND_PORT:-8080}:8080" # pc포트 - 컨테이너 포트 포트포워딩
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - internal
      - public

volumes:
  mysql_data:
  redis_data:

networks:
  internal:
    internal: true
  public:

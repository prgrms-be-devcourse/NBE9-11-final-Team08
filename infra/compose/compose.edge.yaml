# Edge м„ңлІ„ м „мҡ© compose вҖ” nginxмҷҖ certbotл§Ң мӢӨн–үн•ңлӢӨ.
# BACKEND_UPSTREAMм—җлҠ” app м„ңлІ„мқҳ private IPмҷҖ Spring нҸ¬нҠёлҘј л„ЈлҠ”лӢӨ.
# мҳҲ: BACKEND_UPSTREAM=10.0.1.123:8081
name: nbe9-11-final-team08-edge

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/templates/prod.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot_www:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 5

  certbot:
    image: certbot/certbot:v3.3.0
    profiles: ["certbot"]
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

volumes:
  certbot_www:
  letsencrypt:

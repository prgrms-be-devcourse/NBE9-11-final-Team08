# 개발용 override (compose.yaml 위에 얹어서 사용).
#
# 개발 환경에서는 MySQL만 Docker로 띄우고,
# Spring Boot는 IntelliJ에서 dev 프로파일로 직접 실행합니다.
# (핫 리로드 / 디버깅 / 빠른 피드백을 위해 backend 컨테이너는 사용하지 않습니다.)
#
# DB만 기동:
#   docker compose -f compose.yaml -f compose.dev.yaml up -d db
#
# nginx 라우팅/프록시까지 점검하고 싶을 때만 (선택):
#   docker compose -f compose.yaml -f compose.dev.yaml --profile edge up -d db nginx-dev
#   → http://localhost:80 (nginx) → host.docker.internal:8080 (IntelliJ Spring Boot)

services:
  db:
    ports:
      - "3306:3306"   # IntelliJ가 localhost:3306으로 접속
    networks:
      # base의 internal 네트워크는 host 격리(internal: true)라 포트 발행이 안 됨.
      # dev에서는 host에서 붙을 수 있도록 public 네트워크에도 연결.
      - internal
      - public

  # 평소엔 뜨지 않음. --profile edge 로만 기동.
  nginx-dev:
    image: nginx:1.27-alpine
    profiles: ["edge"]
    restart: unless-stopped
    environment:
      DOMAIN: localhost
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux 대응 (Mac/Win은 기본 지원)
    volumes:
      - ../nginx/templates/dev.conf.template:/etc/nginx/templates/default.conf.template:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - public

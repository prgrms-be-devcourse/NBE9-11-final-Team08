# 개발용 standalone compose — 단독 실행 (base 와 머지하지 않는다).
#
# 개발 환경에서는 MySQL/Redis만 Docker로 띄우고,
# Spring Boot는 IntelliJ에서 dev 프로파일로 직접 실행한다.
# (핫 리로드 / 디버깅 / 빠른 피드백을 위해 backend 컨테이너는 쓰지 않는다.)
#
# DB/Redis 기동:
#   docker compose -f compose.dev.yaml up -d db redis           (= make dev)
#
# nginx 라우팅/프록시까지 점검할 때만 (선택):
#   docker compose -f compose.dev.yaml --profile edge up -d db redis nginx-dev   (= make edge)
#   → http://localhost:80 (nginx) → host.docker.internal:8080 (IntelliJ Spring Boot)
#
# 프로젝트명을 base 와 동일하게 두어 기존 dev DB 볼륨(nbe9-11-final-team08_mysql_data)을 유지한다.

name: nbe9-11-final-team08-dev

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "3306:3306"   # IntelliJ가 localhost:3306으로 접속
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - dev

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"   # IntelliJ가 localhost:6379로 접속
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - dev

  # 평소엔 뜨지 않음. --profile edge 로만 기동.
  nginx-dev:
    image: nginx:1.27-alpine
    profiles: [ "edge" ]
    restart: unless-stopped
    environment:
      DOMAIN: localhost
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux 대응 (Mac/Win은 기본 지원)
    volumes:
      - ../nginx/templates/dev.conf.template:/etc/nginx/templates/default.conf.template:ro
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/nginx-health" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - dev

  # 평소엔 뜨지 않음. --profile monitor 로만 기동.
  prometheus:
    image: prom/prometheus:latest
    profiles: [ "monitor" ]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - dev

  grafana:
    image: grafana/grafana:latest
    profiles: [ "monitor" ]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana   # named 볼륨 — 컨테이너 재생성에도 상태 보존
    networks:
      - dev

  # 호스트 시스템 메모리/CPU 메트릭(node_memory_*, node_cpu_*) 노출.
  # 주의(macOS): Docker Desktop의 리눅스 VM 기준 값이라 Mac 실호스트와 다를 수 있다.
  #   Mac 실측이 필요하면 `brew install node_exporter`로 네이티브 기동 후
  #   prometheus.yml의 node job 타깃을 host.docker.internal:9100 으로 바꿔 스크랩한다.
  node-exporter:
    image: prom/node-exporter:latest
    profiles: [ "monitor" ]
    pid: host
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - dev

volumes:
  mysql_data:
  grafana_data:

networks:
  dev:
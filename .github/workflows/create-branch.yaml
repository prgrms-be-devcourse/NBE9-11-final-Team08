name: Create Branch

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number"
        required: true
        type: string
      issue_title:
        description: "Issue title (must contain [type])"
        required: true
        type: string
      issue_body:
        description: "Issue body (must contain the Branch field)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-branch:
    # [all] 통합 관리 이슈는 브랜치 생성 대상이 아니므로 job 자체를 건너뛴다.
    if: ${{ !startsWith(github.event.issue.title, '[all]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create branch from issue
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title || github.event.inputs.issue_title }}
          ISSUE_BODY: ${{ github.event.issue.body || github.event.inputs.issue_body }}
        run: |
          set -euo pipefail

          TYPE=$(
            printf '%s\n' "$ISSUE_TITLE" \
            | grep -oP '(?<=\[)[a-z]+(?=\])' \
            | head -n1
          )

          # 이슈 폼은 "### 🌿 Branch" 헤딩 다음 빈 줄을 거쳐 값을 렌더링하므로
          # 헤딩 이후 첫 번째 비어있지 않은 줄을 브랜치 키로 사용한다.
          BRANCH_KEY=$(
            printf '%s\n' "$ISSUE_BODY" \
            | awk '/Branch/{found=1; next} found && NF {print; exit}' \
            | xargs
          )

          # 브랜치 키는 선택 입력이다. 비어 있으면 (예: [all] 이슈)
          # 브랜치를 만들지 않고 조용히 종료한다.
          if [ -z "$BRANCH_KEY" ]; then
            echo "No branch key provided — skipping branch creation"
            exit 0
          fi

          if [ -z "$TYPE" ]; then
            echo "Issue title must contain [type]"
            exit 1
          fi

          # 타입 검증
          if ! [[ "$TYPE" =~ ^(feat|fix|docs|refactor|test|chore)$ ]]; then
            echo "Invalid issue type: $TYPE"
            exit 1
          fi

          # 브랜치 키 검증
          if ! [[ "$BRANCH_KEY" =~ ^[a-z0-9-]+$ ]]; then
            echo "Branch key may only contain lowercase letters, numbers, and hyphens"
            exit 1
          fi

          BRANCH_NAME="${TYPE}/${ISSUE_NUMBER}-${BRANCH_KEY}"

          # 최종 브랜치명 검증
          if ! git check-ref-format --branch "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "Invalid branch name: $BRANCH_NAME"
            exit 1
          fi

          # 이미 존재하는 브랜치면 건너뛴다.
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "Branch already exists: $BRANCH_NAME"
            exit 0
          fi

          echo "Creating branch: $BRANCH_NAME"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git push origin "$BRANCH_NAME"

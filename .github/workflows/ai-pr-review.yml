name: Team08 AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - dev
      - main

jobs:
  review:
    runs-on: ubuntu-latest
    # 혹시 모를 스크립트 완전 실패 시에도 파이썬 외부에서 PR 머지가 막히지 않도록 안전장치 추가
    continue-on-error: true 
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install google-genai

      - name: Gemini AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > review_script.py
          import os
          import json
          import sys
          from google import genai
          import subprocess

          # 1. 초기 메시지 설정 (클로드 아이디어 반영: 에러 시 Gemini 호출 안 하고 이 메시지를 바로 코멘트로 등록)
          body = ""

          # 2. 변경된 파일 목록 및 전체 내용 가져오기
          try:
              changed_files = subprocess.check_output(["git", "diff", "--name-only", "origin/${{ github.base_ref }}...HEAD"]).decode("utf-8").splitlines()
              full_context = ""
              for file in changed_files:
                  if os.path.exists(file) and file.endswith(('.java', '.yaml', '.yml', '.sql')):
                      with open(file, 'r', encoding='utf-8') as f:
                          full_context += f"\n--- Full File Content: {file} ---\n{f.read()}\n"

              diff = subprocess.check_output(["git", "diff", "origin/${{ github.base_ref }}...HEAD"]).decode("utf-8")
          except Exception as e:
              # 데이터 가져오기 실패 시, 의미 없는 빈 컨텍스트를 Gemini에 보내지 않고 리뷰 메시지를 에러 내용으로 확정
              body = f"⚠️ **AI 리뷰어 실행 실패**: Git 변경사항(Diff) 데이터를 가져오는 데 실패했습니다.\n```\n{str(e)}\n```"

          # 3. Git 데이터를 성공적으로 가져왔을 때만 Gemini AI 호출
          if not body:
              try:
                  client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])
                  
                  prompt = f"""
                  당신은 Java 17 및 Spring Boot 3.5 전문가인 Senior Backend Engineer입니다.
                  제공된 실제 코드 변경사항(Diff)과 전체 소스코드를 바탕으로 PR을 리뷰하여 백엔드 아키텍처, 성능, 보안, 그리고 생산성을 고려한 피드백을 제시하세요.
                  절대로 코드를 임의로 예상하거나 가정해서 리뷰하지 말고, 오직 제공된 소스코드에 존재하는 문제만 지적하세요.

                  [프로젝트 환경 정보]
                  - Language: Java 17
                  - Framework: Spring Boot 3.5.14
                  - Major Libraries: Spring Batch, Spring Security, Validation, Lombok, Springdoc OpenAPI, H2

                  [리뷰 원칙]
                  1. Diff에서 실제로 변경된 부분에만 집중하세요. 변경되지 않은 기존 코드의 문제는 지적하지 마세요.
                  2. 같은 지적을 반복하지 마세요. 이미 반영된 내용이 보이면 "개선됨"으로 짧게 언급하고 넘어가세요.
                  3. 중요도 기준을 엄격하게 적용하여 아래의 신호등 표시로 분류하세요:
                     - 🔴 반드시 수정: 보안 취약점, 데이터 정합성 오류, 동시성 이슈, 심각한 버그
                     - 🟡 권장 수정: 성능 저하, 예외 처리 누락, 유지보수 및 확장성 문제
                     - 🟢 선택적 개선: 가독성, 자바 17 최신 문법(Record 등) 활용 제안, 네이밍 등 사소한 스타일
                  4. 🟢 선택적 개선은 최대 2개까지만 작성하고, 사소한 것은 과감히 생략하세요.
                  5. 지적할 때는 반드시 구체적인 '이유'와 '개선 코드 예시'를 함께 제시하세요.
                  6. 전체적으로 리뷰할 내용이나 문제가 없으면 다른 말 없이 딱 한 줄로 "**특이사항 없음**"으로 짧게 종료하세요.

                  [응답 형식]
                  - 반드시 한국어로 응답하세요.

                  [리뷰 대상 데이터]
                  실제 변경된 코드 (Git Diff):
                  {diff}

                  전체 파일 컨텍스트:
                  {full_context}
                  """
                  
                  response = client.models.generate_content(
                      model='models/gemini-3.1-flash-lite',
                      contents=prompt
                  )
                  body = response.text
              except Exception as e:
                  body = f"⚠️ **AI 리뷰어 API 오류**: Gemini 호출 중 에러가 발생했습니다.\n```\n{str(e)}\n```"

          # 4. 기존 봇 코멘트 찾아서 수정, 없으면 새로 작성 (최종 결과 적용)
          pr_number = "${{ github.event.pull_request.number }}"
          repo = "${{ github.repository }}"

          try:
              comments_json = subprocess.check_output([
                  "gh", "api", f"repos/{repo}/issues/{pr_number}/comments"
              ]).decode("utf-8")
              comments = json.loads(comments_json)
              bot_comment = next(
                  (c for c in comments if c["user"]["login"] == "github-actions[bot]"),
                  None
              )
          except:
              bot_comment = None

          with open("review_message.txt", "w", encoding="utf-8") as f:
              f.write(body)

          if bot_comment:
              import json as _json
              with open("patch_body.json", "w", encoding="utf-8") as f:
                  _json.dump({"body": body}, f, ensure_ascii=False)
              subprocess.run([
                  "gh", "api", f"repos/{repo}/issues/comments/{bot_comment['id']}",
                  "-X", "PATCH", "--input", "patch_body.json"
              ])
          else:
              subprocess.run([
                  "gh", "pr", "comment", pr_number, "--body-file", "review_message.txt"
              ])
              
          # 만약 Git 에러나 API 에러 상태였다면 최종 스크립트 상태를 실패 상태로 마감 (continue-on-error 덕분에 머지는 안 막힘)
          if "⚠️" in body:
              sys.exit(1)
          EOF
          python review_script.py
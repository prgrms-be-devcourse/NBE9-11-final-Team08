name: "🐛 2. BUG ISSUE (버그 수정)"
description: "버그 수정 관련 이슈 템플릿"
title: "[fix] "
labels: ["🐛 type: bug"]
body:
  - type: textarea
    id: bug_description
    attributes:
      label: "🐛 버그 현상"
      description: "어떤 문제가 발생했는지 상세히 적어주세요."
    validations:
      required: true

  - type: input
    id: branch
    attributes:
      label: "🌿 Branch"
      description: "브랜치 키를 입력하세요 (선택, 소문자/숫자/하이픈만 허용). 비워두면 브랜치를 만들지 않습니다."
      placeholder: "ex) fix-login-null-error"
    validations:
      required: false

  - type: textarea
    id: reproduction_steps
    attributes:
      label: "🕹️ 재현 방법"
      value: |
        1. 어떤 페이지/기능으로 이동
        2. 어떤 버튼 클릭 또는 데이터 입력
        3. 발생하는 에러 내용
    validations:
      required: true

  - type: textarea
    id: expected_result
    attributes:
      label: "🎯 기대 결과"
      description: "정상적으로 작동한다면 어떤 결과가 나와야 하나요?"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "📸 스크린샷 (선택)"
      description: "에러 로그나 화면 캡처가 있다면 첨부해 주세요."

spring:
  ai:
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    csrf:
      enabled: true

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
  ai:
    model: stub
    prompt-version: v1
  data-init:
    mode: ${APP_DATA_INIT_MODE:none}  # none:더미데이터 필요 x | simple: 더미데이터 소량생성 | bulk : 더미데이터 대량생성
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-that-is-at-least-32-characters-long-for-hs256}
    access-cookie:
      secure: false
      same-site: Lax
      domain:
    refresh-cookie:
      secure: false
      same-site: Lax
      domain:

cloud:
  aws:
    cloudfront:
      enabled: false

file:
  upload-dir: ${LOCAL_UPLOAD_DIR:./videos-local}

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus, info
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      # http.server.requests를 히스토그램으로 게시 → Prometheus가 p50/p95/p99 산출 가능
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s
      minimum-expected-value:
        http.server.requests: 5ms
      maximum-expected-value:
        http.server.requests: 5s

server:
  tomcat:
    # Tomcat 스레드 풀/커넥션 메트릭(tomcat_threads_busy 등) 노출 → 스레드 풀 포화 병목 식별
    mbeanregistry:
      enabled: true
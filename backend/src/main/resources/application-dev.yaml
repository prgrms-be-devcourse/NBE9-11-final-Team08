spring:
  flyway:
    enabled: false
  ai:
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:file:./db_dev;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update

springdoc:
  api-docs:
    enabled: true

app:
  ai:
    model: stub
    prompt-version: v1
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-that-is-at-least-32-characters-long-for-hs256}
    refresh-cookie:
      secure: false
      same-site: None

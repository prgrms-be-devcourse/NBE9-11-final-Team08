spring:
  flyway:
    enabled: false
  ai:
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
  jpa:
    hibernate:
      ddl-auto: update
springdoc:
  api-docs:
    enabled: true

app:
  ai:
    model: stub
    prompt-version: v1
  data-init:
    mode: none  # none:더미데이터 필요 x | simple: 더미데이터 소량생성 | bulk : 더미데이터 대량생성
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-that-is-at-least-32-characters-long-for-hs256}
    refresh-cookie:
      secure: false
      same-site: None

file:
  upload-dir: ${LOCAL_UPLOAD_DIR:./videos-local}
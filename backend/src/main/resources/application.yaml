spring:
  application:
    name: backend
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  datasource:
    # URL에 file: 을 추가해 줍니다.
    url: jdbc:h2:file:./db_dev;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

spring:
  application:
    name: backend
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate

springdoc:
  api-docs:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

server:
  forward-headers-strategy: framework

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-millis: ${JWT_EXPIRATION_MILLIS:3600000}
    refresh-expiration-millis: ${JWT_REFRESH_EXPIRATION_MILLIS:1209600000}
    refresh-cookie:
      name: refreshToken
      secure: ${IS_COOKIE_SECURE:true}
      same-site: ${SAME_SITE:Lax}

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  application:
    name: backend
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_updates: true
        order_inserts: true

springdoc:
  api-docs:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

server:
  shutdown: graceful
  forward-headers-strategy: framework

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-millis: ${JWT_EXPIRATION_MILLIS:3600000}
    refresh-expiration-millis: ${JWT_REFRESH_EXPIRATION_MILLIS:1209600000}
    refresh-cookie:
      name: refreshToken
      secure: ${IS_COOKIE_SECURE:true}
      same-site: ${SAME_SITE:Lax}
  feed:
    outbox:
      scheduler-enabled: ${FEED_OUTBOX_SCHEDULER_ENABLED:true}
      max-retries: ${FEED_OUTBOX_MAX_RETRIES:5}
      retry-base-delay-seconds: ${FEED_OUTBOX_RETRY_BASE_DELAY_SECONDS:10}
      retry-max-delay-seconds: ${FEED_OUTBOX_RETRY_MAX_DELAY_SECONDS:600}
  payment:
    toss:
      base-url: ${TOSS_PAYMENTS_BASE_URL:https://api.tosspayments.com}
      secret-key: ${TOSS_PAYMENTS_SECRET_KEY:}
      connect-timeout: ${TOSS_PAYMENTS_CONNECT_TIMEOUT:3s}
      read-timeout: ${TOSS_PAYMENTS_READ_TIMEOUT:5s}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    region:
      static: ap-northeast-2
    s3:
      bucket: ${AWS_S3_BUCKET_NAME}
    cloudfront:
      distribution-domain: ${CLOUDFRONT_DOMAIN}
      key-pair-id: ${CLOUDFRONT_KEY_PAIR_ID}
      private-key: ${CLOUDFRONT_PRIVATE_KEY}
    stack:
      auto: false

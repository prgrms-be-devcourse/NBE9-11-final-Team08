spring:
  profiles:
    active: test
  ai:
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false

app:
  ai:
    model: stub
    prompt-version: v1
  jwt:
    secret: test-secret-key-test-secret-key-test-secret-key
    expiration-millis: 3600000
    refresh-expiration-millis: 1209600000

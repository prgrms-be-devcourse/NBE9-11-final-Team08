spring:
  profiles:
    active: test
  flyway:
    enabled: false
  ai:
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
  datasource:
    url: jdbc:mysql://db:3306/team08_test
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: user
    password: 1234

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false

  cloud:
    aws:
      region:
        static: ap-northeast-2
      credentials:
        instance-profile: false
      s3:
        bucket: test-bucket-name

app:
  ai:
    model: stub
    prompt-version: v1
  jwt:
    secret: test-secret-key-test-secret-key-test-secret-key
    expiration-millis: 3600000
    refresh-expiration-millis: 1209600000

file:
  upload-dir: src/test/resources/test-uploads
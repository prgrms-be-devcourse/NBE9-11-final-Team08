spring:
  profiles:
    active: test
  flyway:
    enabled: false
  ai:
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
  datasource:
    # 운영(Asia/Seoul)과 동일하게 DB 세션 타임존을 +09:00으로 맞춘다.
    # 컨테이너 MySQL은 기본 UTC라, 이게 없으면 CURRENT_TIMESTAMP 가 JVM의
    # LocalDateTime(KST)과 어긋나 만료 비교 같은 시간 로직이 깨진다.
    url: jdbc:tc:mysql:8.4:///team08_test?sessionVariables=time_zone='%2B09:00'
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test

  # @DataJpaTest 가 기본으로 시도하는 임베디드 DB 교체를 끄고 (운영db참조 안하도록),
  # 위에서 지정한 Testcontainers MySQL 데이터소스를 그대로 사용한다.
  test:
    database:
      replace: none

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false

  cloud:
    aws:
      region:
        static: ap-northeast-2
      credentials:
        instance-profile: false
      s3:
        bucket: test-bucket-name

app:
  ai:
    model: stub
    prompt-version: v1
  data-init:
    mode: none
  jwt:
    secret: test-secret-key-test-secret-key-test-secret-key
    expiration-millis: 3600000
    refresh-expiration-millis: 1209600000

file:
  upload-dir: src/test/resources/test-uploads
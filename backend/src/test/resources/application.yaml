spring:
  profiles:
    active: test
  flyway:
    enabled: false
  ai:
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
  datasource:

    url: jdbc:tc:mysql:8.4:///team08_test?sessionVariables
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test

  # @DataJpaTest 가 기본으로 시도하는 임베디드 DB 교체를 끄고 (운영db참조 안하도록),
  # 위에서 지정한 Testcontainers MySQL 데이터소스를 그대로 사용한다.
  test:
    database:
      replace: none

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false

  cloud:
    aws:
      region:
        static: ap-northeast-2
      credentials:
        instance-profile: false
      s3:
        bucket: test-bucket-name

app:
  ai:
    model: stub
    prompt-version: v1
  jwt:
    secret: test-secret-key-test-secret-key-test-secret-key
    expiration-millis: 3600000
    refresh-expiration-millis: 1209600000

file:
  upload-dir: src/test/resources/test-uploads
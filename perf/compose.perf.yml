# ============================================================================
# 부하 테스트 stack — k6(부하 발생) + influxdb(이력) + grafana(대시보드)
# ----------------------------------------------------------------------------
# 측정 대상 서버(app/db)는 여기 없다. deploy 쪽에서 띄운다:
#   dev  : make dev  + IntelliJ 로 backend 실행 (host:8080)
#   prod : make prod
# k6 는 docker 내부망이 아니라 호스트 밖 서버를 친다:
#     BASE_URL: http://host.docker.internal:8080
# 관측 도구(influxdb/grafana)를 측정 대상과 분리해 자원 경합/오염을 막는다.
#
#   make perf PERF_SCRIPT=last-watched-baseline.js
#   make perf-down   (볼륨 유지)  /  make perf-reset (볼륨 삭제)
# ============================================================================

name: team08-perf

services:
  influxdb:
    image: influxdb:1.8
    environment:
      INFLUXDB_DB: k6
    volumes:
      - influxdb-data:/var/lib/influxdb   # named 볼륨 — 지난 런 메트릭 이력 보존
    networks: [perf]

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_BASIC_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana    # named 볼륨 — import 한 대시보드 보존
    depends_on: [influxdb]
    networks: [perf]

  k6:
    image: grafana/k6:0.49.0
    profiles: ["k6"]
    depends_on: [influxdb]
    environment:
      BASE_URL: http://host.docker.internal:8080    # 측정 대상 서버를 호스트 경유로 호출
    extra_hosts:
      - "host.docker.internal:host-gateway"          # Linux 호환용 (Mac 은 기본 지원)
    volumes:
      - ./k6:/scripts:ro
    networks: [perf]

networks:
  perf:

volumes:
  influxdb-data:
  grafana-data:

# ============================================================================
# 부하 테스트 - 분리 모드 [서버 stack] (측정 대상)
# ----------------------------------------------------------------------------
# db + app 만 정의하고, app 을 호스트 8080 포트로 노출한다.
# 부하기(compose.client.yml)는 host.docker.internal:8080 으로 호스트 경계를 넘어
# 들어온다 → 실제 두 머신이 네트워크로 통신하는 토폴로지를 흉내낸다.
#
#   make perf-server        # 이 stack 기동
#   make perf-split-down    # client+server 모두 정리
# ============================================================================

name: team08-perf-server

services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-team08}
      MYSQL_USER: ${DB_USERNAME:-team08}
      MYSQL_PASSWORD: ${DB_PASSWORD:-team08pw}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql   # named 볼륨 — down(유지) 시 시드 보존 → 재기동 시 재시딩 스킵
    networks: [server]

  app:
    build:
      context: ../backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      APP_DATA_INIT_MODE: bulk
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-team08}
      DB_USERNAME: ${DB_USERNAME:-team08}
      DB_PASSWORD: ${DB_PASSWORD:-team08pw}
      JWT_SECRET: ${JWT_SECRET:-perf-secret-key-that-is-at-least-32-characters-long}
      IS_COOKIE_SECURE: "false"
      SAME_SITE: Lax
      LOCAL_UPLOAD_DIR: /tmp/videos-local
      AWS_REGION: ap-northeast-2
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_S3_BUCKET_NAME: dummy-bucket
      OPENAI_API_KEY: dummy
      TZ: Asia/Seoul
    ports:
      - "8080:8080"          # 서버 머신의 '공개 포트' — 부하기가 여기로 들어온다
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks: [server]

networks:
  server:

volumes:
  mysql-data:

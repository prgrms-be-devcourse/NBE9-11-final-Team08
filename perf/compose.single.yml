# ============================================================================
# 부하 테스트 - 한 머신 모드 (db + app + k6 + influxdb + grafana 올인원)
# ----------------------------------------------------------------------------
# 부하기(k6)와 측정대상(app/db)이 같은 호스트에서 돈다 → before/after 상대 비교용.
# k6 결과는 InfluxDB 로 흘러가 Grafana(localhost:3000)에서 실시간으로 보인다.
# (client/server 를 나눠 재려면 compose.server.yml + compose.client.yml 사용)
#
# 실행 (프로젝트 루트에서):
#   make perf                          # 전체 기동 + learning-event-perf.js 실행
#   make perf PERF_SCRIPT=other.js     # perf/k6 의 다른 스크립트 실행
#   make perf-down                     # 정리
# ============================================================================

name: team08-perf

services:
  # --------------------------------------------------------------------------
  # MySQL 8.4 (운영과 동일, KST)
  # --------------------------------------------------------------------------
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-team08}
      MYSQL_USER: ${DB_USERNAME:-team08}
      MYSQL_PASSWORD: ${DB_PASSWORD:-team08pw}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks: [perf]

  # --------------------------------------------------------------------------
  # 백엔드 앱 (dev 프로필 + bulk 시드)
  #   - dev 프로필: flyway off + ddl-auto=update 로 스키마 자동 생성
  #   - bulk 시드: admin/seller1/user1(비번 Test1234!) + 강의/챕터/강의영상 생성
  #   - S3/AI 는 부하 테스트에서 쓰지 않으므로 더미값으로 컨텍스트만 통과시킨다
  # --------------------------------------------------------------------------
  app:
    build:
      context: ../backend             # backend/ 루트 (perf/ 기준 한 단계 위)
    environment:
      SPRING_PROFILES_ACTIVE: dev
      APP_DATA_INIT_MODE: bulk
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-team08}
      DB_USERNAME: ${DB_USERNAME:-team08}
      DB_PASSWORD: ${DB_PASSWORD:-team08pw}
      JWT_SECRET: ${JWT_SECRET:-perf-secret-key-that-is-at-least-32-characters-long}
      IS_COOKIE_SECURE: "false"
      SAME_SITE: Lax
      # 업로드 디렉토리: 컨테이너는 비루트(spring) 유저라 /app 하위에 못 쓴다 → /tmp
      LOCAL_UPLOAD_DIR: /tmp/videos-local
      # 부하 테스트는 외부 연동을 호출하지 않음 → 더미값(컨텍스트 로딩용).
      # region 은 AWS SDK 표준 env 로 줘야 한다(앱 yaml 의 cloud.aws.region.static 은
      # spring-cloud-aws 3.x 의 prefix(spring.cloud.aws.*)와 달라 무시됨).
      AWS_REGION: ap-northeast-2
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_S3_BUCKET_NAME: dummy-bucket
      OPENAI_API_KEY: dummy
      TZ: Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks: [perf]

  # --------------------------------------------------------------------------
  # k6 (스크립트 실행은 Makefile 이 제어)
  #   make perf 가 `compose run --rm k6 run /scripts/<script>` 형태로 호출한다.
  #   - profiles: 일반 up 에서는 뜨지 않음 (make 가 인프라만 먼저 띄움)
  #   - volumes: 스크립트 디렉토리 전체를 마운트 → 다른 k6 스크립트도 재사용
  # --------------------------------------------------------------------------
  k6:
    image: grafana/k6:0.49.0
    profiles: ["k6"]
    depends_on: [influxdb] # influxDB 먼저 생성하도록
    environment:
      BASE_URL: http://app:8080
    volumes:
      - ./k6:/scripts:ro
    networks: [perf]

  # 시계열 DB — k6 결과를 저장 (호스트 포트 노출 X, 내부망에서만 접근)
  influxdb:
    image: influxdb:1.8
    environment:
      INFLUXDB_DB: k6          # 'k6' 데이터베이스 자동 생성
    networks: [ perf ]

  # 대시보드 — InfluxDB를 읽어 그래프로 그림
  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"            # 브라우저로 localhost:3000 접속
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin   # 로그인 없이 바로 보기 (로컬 전용)
      GF_AUTH_BASIC_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro  # Step 2에서 만들 설정
    depends_on: [ influxdb ]
    networks: [ perf ]

networks:
  perf:
